<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Eficiencia</title>

<link rel="stylesheet" href="styles.css">
  
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  margin: 0;
  padding: 10px;
}

/* CONTENEDOR */
.card {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 20px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
  text-align: center;
  font-size: 20px;
}

/* LABELS */
label {
  font-size: 13px;
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin-top: 4px;
  border-radius: 10px;
  border: none;
  background: #e0e0e0;
  box-shadow: inset 3px 3px 6px #bebebe,
              inset -3px -3px 6px #ffffff;
  font-size: 16px;
}

/* TABLA RESPONSIVE */
.table-container {
  overflow-x: auto;
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 300px;
}

th {
  background: #007bff;
  color: white;
  padding: 8px;
  font-size: 12px;
}

td {
  padding: 5px;
}

/* BOTÓN */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  background: linear-gradient(145deg, #28a745, #218838);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

/* RESULTADO */
.resultado {
  margin-top: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  padding: 10px;
  border-radius: 10px;
}

.verde { background: #28a745; color: white; }
.amarillo { background: #ffc107; }
.rojo { background: #dc3545; color: white; }

/* METAS */
.meta-table {
  margin-top: 15px;
}

.meta-table th {
  background: #343a40;
}

.meta-table td {
  text-align: center;
  font-weight: bold;
  font-size: 14px;
}

/* 📱 AJUSTES EXTRA PARA CELULAR */
@media (max-width: 480px) {
  h2 { font-size: 18px; }
  input { font-size: 15px; padding: 10px; }
  button { font-size: 16px; }
}
</style>
</head>

<body>

<div class="card">
<h2>ERP Eficiencia (Con TO Directo) </h2>

<label>Horas Laboradas</label>
<input type="number" id="horas">

<label>TO Directo</label>
<input type="number" id="to">

<div class="table-container">
<table>
<tr>
<th>Estilo</th>
<th>SMV</th>
<th>Producción Real</th>
</tr>

<tr>
<td>Estilo 1</td>
<td><input type="number" id="smv1"></td>
<td><input type="number" id="prod1"></td>
</tr>

<tr>
<td>Estilo 2</td>
<td><input type="number" id="smv2"></td>
<td><input type="number" id="prod2"></td>
</tr>

<tr>
<td>Estilo 3</td>
<td><input type="number" id="smv3"></td>
<td><input type="number" id="prod3"></td>
</tr>
</table>
</div>

<button onclick="calcular()">Calcular</button>

<div id="resultado" class="resultado"></div>

<div class="table-container">
<table class="meta-table">
<tr>
<th>Meta</th>
<th>Producción Requerida</th>
</tr>
<tr>
<td>100%</td>
<td id="meta100">-</td>
</tr>
<tr>
<td>95%</td>
<td id="meta95">-</td>
</tr>
<tr>
<td>90%</td>
<td id="meta90">-</td>
</tr>
</table>
</div>

</div>

<script src="script.js"></script>


</body>
</html>
