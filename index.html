<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora ERP Multi-Estilo</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 320px;
    }
    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    .resultado {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>ERP Multi-Estilo</h2>

  <input type="number" id="horas" placeholder="Horas laboradas">
  <input type="number" id="to" placeholder="TO">

  <hr>

  <strong>Estilo 1</strong>
  <input type="number" id="smv1" placeholder="SMV 1">
  <input type="number" id="prod1" placeholder="Producción Real 1">

  <strong>Estilo 2</strong>
  <input type="number" id="smv2" placeholder="SMV 2">
  <input type="number" id="prod2" placeholder="Producción Real 2">

  <strong>Estilo 3</strong>
  <input type="number" id="smv3" placeholder="SMV 3">
  <input type="number" id="prod3" placeholder="Producción Real 3">

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
  let horas = parseFloat(document.getElementById("horas").value);
  let to = parseFloat(document.getElementById("to").value);

  let smv1 = parseFloat(document.getElementById("smv1").value) || 0;
  let prod1 = parseFloat(document.getElementById("prod1").value) || 0;

  let smv2 = parseFloat(document.getElementById("smv2").value) || 0;
  let prod2 = parseFloat(document.getElementById("prod2").value) || 0;

  let smv3 = parseFloat(document.getElementById("smv3").value) || 0;
  let prod3 = parseFloat(document.getElementById("prod3").value) || 0;

  if (!horas || !to) {
    document.getElementById("resultado").innerText = "Faltan datos principales";
    return;
  }

  function calcEstilo(smv, prod) {
    if (smv === 0) return { ajustada: 0, real: 0 };
    let std = (horas * 60) / smv;
    let ajustada = std * to;
    return { ajustada: ajustada, real: prod };
  }

  let e1 = calcEstilo(smv1, prod1);
  let e2 = calcEstilo(smv2, prod2);
  let e3 = calcEstilo(smv3, prod3);

  let totalAjustado = e1.ajustada + e2.ajustada + e3.ajustada;
  let totalReal = e1.real + e2.real + e3.real;

  if (totalAjustado === 0) {
    document.getElementById("resultado").innerText = "Error en datos";
    return;
  }

  let eficiencia = (totalReal / totalAjustado) * 100;

  document.getElementById("resultado").innerText =
    "Eficiencia ERP Total: " + eficiencia.toFixed(2) + " %";
}
</script>

</body>
</html>
