<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ERP Multi-Estilo</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      font-size: 13px;
    }

    input {
      width: 100%;
      margin: 5px 0 10px 0;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th {
      background: #007bff;
      color: white;
      padding: 6px;
      font-size: 12px;
    }

    td {
      padding: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .resultado {
      margin-top: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      padding: 10px;
      border-radius: 8px;
    }

    .verde { background: #28a745; color: white; }
    .amarillo { background: #ffc107; color: black; }
    .rojo { background: #dc3545; color: white; }

  </style>
</head>
<body>

<div class="card">
  <h2>Calculadora ERP</h2>

  <label>Horas Laboradas</label>
  <input type="number" id="horas">

  <label>TO (Tiempo Operativo)</label>
  <input type="number" id="to">

  <table>
    <tr>
      <th>Estilo</th>
      <th>SMV</th>
      <th>Producción</th>
    </tr>

    <tr>
      <td>1</td>
      <td><input type="number" id="smv1"></td>
      <td><input type="number" id="prod1"></td>
    </tr>

    <tr>
      <td>2</td>
      <td><input type="number" id="smv2"></td>
      <td><input type="number" id="prod2"></td>
    </tr>

    <tr>
      <td>3</td>
      <td><input type="number" id="smv3"></td>
      <td><input type="number" id="prod3"></td>
    </tr>
  </table>

  <button onclick="calcular()">Calcular Eficiencia</button>

  <div id="resultado" class="resultado"></div>
</div>

<script>
function calcular() {
  let horas = parseFloat(document.getElementById("horas").value);
  let to = parseFloat(document.getElementById("to").value);

  let datos = [
    { smv: parseFloat(document.getElementById("smv1").value) || 0, prod: parseFloat(document.getElementById("prod1").value) || 0 },
    { smv: parseFloat(document.getElementById("smv2").value) || 0, prod: parseFloat(document.getElementById("prod2").value) || 0 },
    { smv: parseFloat(document.getElementById("smv3").value) || 0, prod: parseFloat(document.getElementById("prod3").value) || 0 }
  ];

  if (!horas || !to) {
    mostrarResultado("Faltan datos principales", "rojo");
    return;
  }

  let totalAjustado = 0;
  let totalReal = 0;

  datos.forEach(d => {
    if (d.smv > 0) {
      let std = (horas * 60) / d.smv;
      totalAjustado += std * to;
      totalReal += d.prod;
    }
  });

  if (totalAjustado === 0) {
    mostrarResultado("Error en datos", "rojo");
    return;
  }

  let eficiencia = (totalReal / totalAjustado) * 100;

  let color = "rojo";
  if (eficiencia >= 100) color = "verde";
  else if (eficiencia >= 80) color = "amarillo";

  mostrarResultado("Eficiencia: " + eficiencia.toFixed(2) + " %", color);
}

function mostrarResultado(texto, color) {
  let res = document.getElementById("resultado");
  res.innerText = texto;
  res.className = "resultado " + color;
}
</script>

</body>
</html>
