<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ERP Producción</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: #f9f9f9;
  padding: 20px;
  border-radius: 20px;
  width: 420px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* 🔥 LABELS VISIBLES */
label {
  font-size: 13px;
  font-weight: bold;
  display: block;
  margin-top: 8px;
}

/* INPUTS CON RELIEVE */
input {
  width: 100%;
  padding: 10px;
  margin-top: 3px;
  border-radius: 10px;
  border: none;
  background: #e0e0e0;
  box-shadow: inset 3px 3px 6px #bebebe,
              inset -3px -3px 6px #ffffff;
  font-size: 14px;
}

/* TABLA */
table {
  width: 100%;
  margin-top: 12px;
  border-collapse: collapse;
}

th {
  background: #007bff;
  color: white;
  padding: 8px;
  font-size: 13px;
}

td {
  padding: 6px;
}

/* BOTÓN */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: linear-gradient(145deg, #28a745, #218838);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 3px 3px 8px #1c7430,
              -3px -3px 8px #34d058;
}

/* RESULTADO */
.resultado {
  margin-top: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  padding: 10px;
  border-radius: 10px;
}

.verde { background: #28a745; color: white; }
.amarillo { background: #ffc107; }
.rojo { background: #dc3545; color: white; }

/* TABLA METAS */
.meta-table {
  margin-top: 15px;
}

.meta-table th {
  background: #343a40;
}

.meta-table td {
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
<h2>Calculadora ERP</h2>

<label>Horas Laboradas</label>
<input type="number" id="horas">

<label>TO (Tiempo Operativo)</label>
<input type="number" id="to">

<table>
<tr>
<th>Estilo</th>
<th>SMV</th>
<th>Producción Real</th>
</tr>

<tr>
<td>Estilo 1</td>
<td><input type="number" id="smv1"></td>
<td><input type="number" id="prod1"></td>
</tr>

<tr>
<td>Estilo 2</td>
<td><input type="number" id="smv2"></td>
<td><input type="number" id="prod2"></td>
</tr>

<tr>
<td>Estilo 3</td>
<td><input type="number" id="smv3"></td>
<td><input type="number" id="prod3"></td>
</tr>
</table>

<button onclick="calcular()">Calcular</button>

<div id="resultado" class="resultado"></div>

<table class="meta-table">
<tr>
<th>Meta</th>
<th>Producción requerida</th>
</tr>
<tr>
<td>100%</td>
<td id="meta100">-</td>
</tr>
<tr>
<td>95%</td>
<td id="meta95">-</td>
</tr>
<tr>
<td>90%</td>
<td id="meta90">-</td>
</tr>
</table>

</div>

<script>
function calcular() {
  let horas = parseFloat(document.getElementById("horas").value);
  let to = parseFloat(document.getElementById("to").value);

  let datos = [
    { smv: parseFloat(smv1.value) || 0, prod: parseFloat(prod1.value) || 0 },
    { smv: parseFloat(smv2.value) || 0, prod: parseFloat(prod2.value) || 0 },
    { smv: parseFloat(smv3.value) || 0, prod: parseFloat(prod3.value) || 0 }
  ];

  if (!horas || !to) {
    mostrar("Faltan datos principales", "rojo");
    return;
  }

  let totalAjustado = 0;
  let totalReal = 0;

  datos.forEach(d => {
    if (d.smv > 0) {
      let std = (horas * 60) / d.smv;
      totalAjustado += std * to;
      totalReal += d.prod;
    }
  });

  if (totalAjustado === 0) {
    mostrar("Error en datos", "rojo");
    return;
  }

  let eficiencia = (totalReal / totalAjustado) * 100;

  let color = "rojo";
  if (eficiencia >= 100) color = "verde";
  else if (eficiencia >= 80) color = "amarillo";

  mostrar("Eficiencia: " + eficiencia.toFixed(2) + " %", color);

  document.getElementById("meta100").innerText = totalAjustado.toFixed(0);
  document.getElementById("meta95").innerText = (totalAjustado * 0.95).toFixed(0);
  document.getElementById("meta90").innerText = (totalAjustado * 0.90).toFixed(0);
}

function mostrar(texto, color) {
  let r = document.getElementById("resultado");
  r.innerText = texto;
  r.className = "resultado " + color;
}
</script>

</body>
</html>
