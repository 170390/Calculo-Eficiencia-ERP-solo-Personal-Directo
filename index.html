<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora ERP</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    .resultado {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Calculadora ERP</h2>

  <input type="number" id="horas" placeholder="Horas laboradas">
  <input type="number" id="smv" placeholder="SMV">
  <input type="number" id="to" placeholder="TO">
  <input type="number" id="produccion" placeholder="Producción Real">

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
  let horas = parseFloat(document.getElementById("horas").value);
  let smv = parseFloat(document.getElementById("smv").value);
  let to = parseFloat(document.getElementById("to").value);
  let produccion = parseFloat(document.getElementById("produccion").value);

  if (!horas || !smv || !to || !produccion) {
    document.getElementById("resultado").innerText = "Completa todos los campos";
    return;
  }

  let produccionStd = (horas * 60) / smv;
  let produccionAjustada = produccionStd * to;
  let eficiencia = (produccion / produccionAjustada) * 100;

  document.getElementById("resultado").innerText =
    "Eficiencia ERP: " + eficiencia.toFixed(2) + " %";
}
</script>

</body>
</html>
